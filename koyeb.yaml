name: radar-analysis
type: WORKER
instance_type: free
regions:
  - was
scaling:
  min: 1
  max: 1
env:
  - key: RADAR_BASE_URL
    value: "https://aichain.goldriver.xyz"
  - key: RADAR_USERNAME
    value: "haifeng"
  - key: RADAR_PASSWORD
    secret: RADAR_PASSWORD
  - key: RADAR_CHAINS
    value: "sol,eth,bsc"
  - key: DISCOVER_INTERVAL
    value: "5"
  - key: PRICE_INTERVAL
    value: "60"
  - key: TRACK_HOURS
    value: "24"
  - key: GMGN_CLI
    value: "gmgn-cli"
  - key: API_PORT
    value: "8000"
  - key: DATABASE_URL
    secret: DATABASE_URL
  - key: FEISHU_WEBHOOK
    secret: FEISHU_WEBHOOK
  - key: LLM_API_KEY
    secret: LLM_API_KEY
  - key: LLM_BASE_URL
    value: "https://claude.biteagle.xyz/v1"
  - key: LLM_MODEL_FAST
    value: "claude-haiku-4-5-20251001"
  - key: LLM_MODEL_PRO
    value: "claude-sonnet-4-6"
  - key: LANGFUSE_HOST
    value: "https://langfuse.biteagle.xyz"
  - key: LANGFUSE_PUBLIC_KEY
    secret: LANGFUSE_PUBLIC_KEY
  - key: LANGFUSE_SECRET_KEY
    secret: LANGFUSE_SECRET_KEY
