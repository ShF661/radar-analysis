name: Discover Tokens

on:
  repository_dispatch:
    types: [radar_signal_completed]
  schedule:
    # GitHub schedule is best-effort. This is only a fallback for a missed
    # repository_dispatch event, so keep each run short and idempotent.
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: discover-latest
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: npm install -g gmgn-cli@1.3.6
      - run: python -m jobs.discover
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RADAR_PASSWORD: ${{ secrets.RADAR_PASSWORD }}
          RADAR_BASE_URL: https://aichain.goldriver.xyz
          RADAR_USERNAME: haifeng
          RADAR_CHAINS: sol,eth,bsc,robinhood
          GMGN_CLI: gmgn-cli
          GMGN_API_KEY: ${{ secrets.GMGN_API_KEY }}
          DISCOVER_CATCHUP_PAGES: "1"
          DISCOVER_RUN_SECONDS: "0"
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: https://claude.biteagle.xyz/v1
          LLM_MODEL_FAST: claude-haiku-4-5-20251001
          LLM_MODEL_PRO: claude-sonnet-4-6
          LANGFUSE_HOST: https://langfuse.biteagle.xyz
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
