name: Discover Tokens

on:
  schedule:
    # GitHub cron is best-effort. One bounded watcher per hour avoids relying
    # on twelve separate five-minute schedule events.
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: discover-watcher
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: npm install -g gmgn-cli
      - run: python -m jobs.discover
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          RADAR_PASSWORD: ${{ secrets.RADAR_PASSWORD }}
          RADAR_BASE_URL: https://aichain.goldriver.xyz
          RADAR_USERNAME: haifeng
          RADAR_CHAINS: sol,eth,bsc,robinhood
          GMGN_CLI: gmgn-cli
          DISCOVER_INTERVAL: "30"
          DISCOVER_CATCHUP_PAGES: "10"
          DISCOVER_RUN_SECONDS: ${{ github.event_name == 'schedule' && '3300' || '0' }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: https://claude.biteagle.xyz/v1
          LLM_MODEL_FAST: claude-haiku-4-5-20251001
          LLM_MODEL_PRO: claude-sonnet-4-6
          LANGFUSE_HOST: https://langfuse.biteagle.xyz
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
